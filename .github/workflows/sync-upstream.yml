name: Sync Upstream to Main

on:
  schedule:
    - cron: '55 1 * * *'    # 06:55 AM PKT / 01:55 UTC
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v3
        with:
          repository: sinjunllc/CustomLightRAG
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/HKUDS/LightRAG.git
          git fetch upstream
          git checkout main

          # 1) Wipe main to match upstream exactly
          git reset --hard upstream/main

          # 2) Restore our workflow file so it isn’t lost
          git checkout origin/main -- .github/workflows/sync-upstream.yml

      - name: Push to origin
        run: |
          git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/sinjunllc/CustomLightRAG.git main --force
