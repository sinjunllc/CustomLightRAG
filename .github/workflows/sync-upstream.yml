name: Sync Upstream to Main

on:
  schedule:
    - cron: '30 3 * * *' # Runs every day at 3:30 AM UTC
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "sinjunllc-bot"
          git config --global user.email "your-email@example.com"

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/HKUDS/LightRAG.git
          git fetch upstream
          git checkout main

      - name: Sync with upstream
        run: |
          git reset --hard origin/main
          git fetch upstream main
          git merge --ff-only upstream/main

      - name: Debug & Clean GH_TOKEN
        env:
          RAW_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Raw token length: ${#RAW_TOKEN}"
          echo "Raw token bytes:" 
          echo "${RAW_TOKEN}" | od -c

          # Now strip *absolutely everything* that isn't a valid token char:
          CLEAN_TOKEN=$(printf "%s" "$RAW_TOKEN" | tr -cd 'A-Za-z0-9_-' )
          echo "Clean token length: ${#CLEAN_TOKEN}"
          echo "Clean token bytes:"
          echo "${CLEAN_TOKEN}" | od -c

          # Export the cleaned value
          echo "GH_TOKEN=${CLEAN_TOKEN}" >> $GITHUB_ENV

      - name: Set up credentials
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GH_TOKEN}@github.com" > ~/.git-credentials

      - name: Push to origin
        env:
          GH_TOKEN: ${{ env.GH_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/sinjunllc/CustomLightRAG.git
          git push origin main
