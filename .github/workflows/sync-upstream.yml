name: Sync Upstream to Main

on:
  schedule:
    - cron: '10 4 * * *' # Runs every day at 4:10 AM UTC
  workflow_dispatch: # Allows for manual triggering

jobs:
  sync-upstream:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config --global user.name "sinjunllc-bot"
          git config --global user.email "your-email@example.com"

      - name: Add upstream
        run: |
          # Add the upstream repository
          git remote add upstream https://github.com/HKUDS/LightRAG.git
          git fetch upstream
          git checkout main

      - name: Sync with upstream
        run: |
          # Ensure the main branch is clean
          git reset --hard origin/main

          # Fetch the latest changes from upstream
          git fetch upstream main

          # Fast-forward merge
          git merge --ff-only upstream/main

      - name: Debug - Verify Token Access and Content
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Token Length: ${#GH_TOKEN}"
          echo "Token Content (Visible Characters Only):"
          echo "${GH_TOKEN}" | od -c

          # Check for newline or whitespace characters
          if [[ "${GH_TOKEN}" =~ \n ]]; then
            echo "ERROR: Token contains a newline character."
            exit 1
          fi

          if [[ "${GH_TOKEN}" =~ \s ]]; then
            echo "ERROR: Token contains whitespace characters."
            exit 1
          fi

          if [ ${#GH_TOKEN} -ne 86 ]; then
            echo "ERROR: Token length is not 86. Please verify the token."
            exit 1
          fi

      - name: Verify Repository Access
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Verifying repository access..."
          curl -H "Authorization: token ${GH_TOKEN}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/sinjunllc/CustomLightRAG \
               | jq '.permissions'

      - name: Verify User Identity
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Verifying user identity..."
          curl -H "Authorization: token ${GH_TOKEN}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/user

      - name: Set Up Credentials for Push
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Setting up credentials for git push..."
          git config --global credential.helper 'store --file=/tmp/git-credentials'
          echo "https://x-access-token:${GH_TOKEN}@github.com" > /tmp/git-credentials
          cat /tmp/git-credentials

      - name: Push to origin
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "Setting remote URL with token authentication..."
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/sinjunllc/CustomLightRAG.git

          # Verify remote URLs
          echo "Verifying remotes..."
          git remote -v

          # Push the changes to the forked repo
          echo "Pushing changes to origin/main..."
          git push origin main || exit 1
